<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Adapter — Field Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1117; --surface: #1A1D27; --border: #2A2D3A;
    --text: #E8EAF0; --muted: #6B7280; --accent: #6366F1;
    --green: #10B981; --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

  nav { padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .nav-tag { font-size: 11px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 100px; }

  .layout { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar { border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .sidebar h2 { font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }

  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
  input, textarea, select {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; padding: 10px 12px; outline: none; transition: border-color .2s; resize: vertical;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: #3A3D4A; }

  /* Media Buttons */
  .input-row { display: flex; gap: 10px; align-items: flex-start; }
  .input-row textarea { flex: 1; }
  .media-btn {
    background: var(--blue); color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer;
    font-size: 12px; display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .media-btn:hover { opacity: 0.8; }
  .media-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .voice-status { font-size: 11px; color: var(--muted); margin-top: 4px; display: none; }

  .submit-btn {
    width: 100%; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; padding: 14px;
    font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
  }
  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; font-size: 13px;
    display: none;
  }
  .result-box.show { display: block; }
  .result-box .tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 100px; margin: 2px;
    background: rgba(99,102,241,0.15); color: var(--accent);
  }
  .priority-CRITICAL { color: var(--red); }
  .priority-HIGH { color: var(--amber); }
  .priority-MEDIUM { color: var(--blue); }
  .priority-LOW { color: var(--green); }

  /* MAIN */
  .main { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .stat-num { font-size: 32px; font-weight: 700; line-height: 1; font-family: 'JetBrains Mono', monospace; }
  .stat-num.accent { color: var(--accent); }
  .stat-num.green  { color: var(--green); }
  .stat-num.red    { color: var(--red); }
  .stat-num.amber  { color: var(--amber); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* FEED */
  .feed-header { display: flex; justify-content: space-between; align-items: center; }
  .feed-header h2 { font-size: 15px; font-weight: 600; }
  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all .2s; }
  .refresh-btn:hover { border-color: var(--text); color: var(--text); }

  .feed { display: flex; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; }
  .feed-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: border-color .2s; }
  .feed-card:hover { border-color: var(--accent); }
  .feed-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .feed-summary { font-size: 14px; font-weight: 500; flex: 1; }
  .feed-meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .feed-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .feed-tag { font-size: 11px; padding: 2px 8px; border-radius: 100px; background: rgba(99,102,241,0.1); color: var(--accent); }
  .resources-list { font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
  .resource-item { display: flex; justify-content: space-between; padding: 4px 0; }
  .resource-link { color: var(--accent); text-decoration: none; font-size: 11px; }
  .resolve-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .2s; }
  .resolve-btn:hover { border-color: var(--green); color: var(--green); }
  .resolved-tag { font-size: 11px; color: var(--green); }

  .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }

  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; letter-spacing: 0.5px; }
  .badge-CRITICAL { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-HIGH     { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-MEDIUM   { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-LOW      { background: rgba(16,185,129,0.15); color: var(--green); }

  @media(max-width:900px){
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    .stats-row { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>
<nav>
  <div class="logo">NGO <span>Adapter</span></div>
  <div style="display: flex; align-items: center; gap: 16px;">
    <span style="font-size: 14px; color: var(--muted);">Welcome, {{ current_user.username }} ({{ current_user.role }})</span>
    <a href="{{ url_for('logout') }}" style="color: var(--red); text-decoration: none; font-size: 14px;">Logout</a>
    <div class="nav-tag">Free Tier — Gemini + Supabase + OpenStreetMap</div>
  </div>
</nav>

<div class="layout">
  <!-- SIDEBAR: Submit -->
  <div class="sidebar">
    <div>
      <h2>Submit Field Report</h2>
    </div>

    <div>
      <label>Field Worker Name</label>
      <input type="text" id="worker" placeholder="e.g. Ravi Kumar">
    </div>

    <div>
      <label>Location / Ward</label>
      <input type="text" id="location" placeholder="e.g. Kodambakkam, Chennai">
    </div>

    <div>
      <label>Field Report (Tamil / English / Madras Bashai)</label>
      <div class="input-row">
        <textarea id="raw" rows="5" placeholder="e.g. Anna nagar 4th block la tanni problem iruku..."></textarea>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <button type="button" class="media-btn" id="voice-btn">🎤 Voice</button>
          <label for="file-input" class="media-btn" style="cursor: pointer; margin: 0; padding: 10px 12px;">
            📎 File
          </label>
          <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png" style="display: none;">
        </div>
      </div>
      <div id="voice-status" class="voice-status"></div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitReport()">
      Submit via Gemini AI →
    </button>

    <!-- Result -->
    <div class="result-box" id="result-box">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">AI ANALYSIS</div>
      <div id="res-summary" style="font-size:14px;font-weight:500;margin-bottom:8px"></div>
      <div id="res-priority" style="font-size:13px;margin-bottom:8px"></div>
      <div id="res-tags"></div>
      <div id="res-dialect" style="font-size:12px;color:var(--muted);margin-top:10px"></div>
    </div>
  </div>

  <!-- MAIN: Dashboard -->
  <div class="main">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-num accent" id="s-total">—</div><div class="stat-label">Total Reports</div></div>
      <div class="stat-card"><div class="stat-num red"   id="s-unresolved">—</div><div class="stat-label">Unresolved</div></div>
      <div class="stat-card"><div class="stat-num green" id="s-resolved">—</div><div class="stat-label">Resolved</div></div>
      <div class="stat-card"><div class="stat-num amber" id="s-top-gap">—</div><div class="stat-label">Top Gap Category</div></div>
    </div>

    <!-- Feed -->
    <div class="feed-header">
      <h2>Live Field Submissions</h2>
      <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
    </div>
    <div class="feed" id="feed">
      <div class="empty">No submissions yet. Submit a field report →</div>
    </div>
  </div>
</div>

<script>
const USER_ROLE = '{{ current_user.role }}';

async function submitReport() {
  const raw      = document.getElementById('raw').value.trim();
  const location = document.getElementById('location').value.trim();
  const worker   = document.getElementById('worker').value.trim();
  if (!raw) { alert('Please enter a field report.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Analysing with Gemini...';

  try {
    const res  = await fetch('/api/submit', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ raw_input: raw, location, worker_name: worker })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const t = data.translated;
    const box = document.getElementById('result-box');
    box.classList.add('show');
    document.getElementById('res-summary').textContent  = t.summary;
    document.getElementById('res-priority').innerHTML   =
      `Priority: <span class="priority-${t.priority}" style="font-weight:700">${t.priority}</span>`;
    document.getElementById('res-tags').innerHTML       =
      (t.crisis_tags||[]).map(tag => `<span class="tag">${tag}</span>`).join('');
    document.getElementById('res-dialect').innerHTML    =
      t.dialect_resolved?.length
        ? 'Dialect: ' + t.dialect_resolved.map(d => `<em>${d.term}</em> → ${d.meaning}`).join(', ')
        : '';

    btn.textContent = '✓ Submitted';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Submit via Gemini AI →'; }, 2000);
    loadDashboard();

  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Submit via Gemini AI →';
    alert('Error: ' + e.message);
  }
}

async function loadDashboard() {
  // Stats
  try {
    const res  = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('s-total').textContent     = data.total;
    document.getElementById('s-unresolved').textContent = data.unresolved;
    document.getElementById('s-resolved').textContent  = data.resolved;
    const gaps = data.gap_frequencies || {};
    const topGap = Object.keys(gaps)[0] || '—';
    document.getElementById('s-top-gap').textContent   = topGap.replace(/_/g,' ');
  } catch(e) { console.log('Stats error:', e); }

  // Feed
  try {
    const res  = await fetch('/api/submissions');
    const rows = await res.json();
    const feed = document.getElementById('feed');

    if (!rows.length) {
      feed.innerHTML = '<div class="empty">No submissions yet.</div>';
      return;
    }

    feed.innerHTML = rows.map(s => {
      const t   = s.translated || {};
      const res = s.resources  || [];
      const sim = s.similar    || [];
      return `
      <div class="feed-card">
        <div class="feed-card-top">
          <div class="feed-summary">${t.summary || s.raw_input}</div>
          <span class="badge badge-${t.priority}">${t.priority||'?'}</span>
        </div>
        <div class="feed-meta">
          📍 ${s.location||'—'} &nbsp;·&nbsp; 👤 ${s.worker_name||'Anonymous'}
          &nbsp;·&nbsp; 🕐 ${s.created_at ? new Date(s.created_at).toLocaleString() : ''}
        </div>
        <div class="feed-tags">
          ${(t.crisis_tags||[]).map(tag=>`<span class="feed-tag">${tag}</span>`).join('')}
        </div>
        ${res.length ? `
        <div class="resources-list">
          <div style="color:var(--text);margin-bottom:4px;font-size:12px;font-weight:500">Nearby Resources</div>
          ${res.slice(0,3).map(r=>`
            <div class="resource-item">
              <span>${r.name} — ${r.distance_km}km</span>
              <a href="${r.maps_link}" target="_blank" class="resource-link">OSM Map →</a>
            </div>
          `).join('')}
        </div>` : ''}
        ${sim.length ? `
        <div style="font-size:12px;color:var(--muted);margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
          Similar past crisis: "${sim[0].summary}" (${Math.round(sim[0].similarity*100)}% match)
          ${sim[0].resolution_notes ? `→ Resolved by: ${sim[0].resolution_notes}` : ''}
        </div>` : ''}
        <div style="margin-top:10px;text-align:right">
          ${s.resolved
            ? `<span class="resolved-tag">✓ Resolved</span>`
            : (USER_ROLE === 'admin'
               ? `<button class="resolve-btn" onclick="resolve('${s.id}', this)">Mark Resolved</button>`
               : `<span style="font-size:11px;color:var(--muted)">Pending Review</span>`)
          }
        </div>
      </div>`;
    }).join('');

  } catch(e) { console.log('Feed error:', e); }
}

async function resolve(id, btn) {
  const notes = prompt('Resolution notes (optional):') || '';
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await fetch(`/api/resolve/${id}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ notes })
    });
    loadDashboard();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Mark Resolved';
  }
}

// Auto-fill worker name
document.getElementById('worker').value = '{{ current_user.username }}';

// Voice input functionality
let recognition = null;
const voiceBtn = document.getElementById('voice-btn');
const voiceStatus = document.getElementById('voice-status');
const rawInput = document.getElementById('raw');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    voiceBtn.textContent = '🎤 ...';
    voiceBtn.disabled = true;
    voiceStatus.textContent = 'Listening...';
    voiceStatus.style.display = 'block';
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    rawInput.value += (rawInput.value ? ' ' : '') + transcript;
    voiceStatus.textContent = 'Added!';
    setTimeout(() => voiceStatus.style.display = 'none', 2000);
  };

  recognition.onerror = () => {
    voiceStatus.textContent = 'Error';
    setTimeout(() => voiceStatus.style.display = 'none', 2000);
  };

  recognition.onend = () => {
    voiceBtn.textContent = '🎤 Voice';
    voiceBtn.disabled = false;
  };

  voiceBtn.addEventListener('click', () => {
    recognition.start();
  });
} else {
  voiceBtn.disabled = true;
  voiceBtn.textContent = '🎤 N/A';
}

// File upload functionality
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  voiceStatus.textContent = 'Processing...';
  voiceStatus.style.display = 'block';
  voiceStatus.style.color = 'var(--accent)';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const response = await fetch('/api/extract-text', {
      method: 'POST',
      body: formData
    });

    if (response.ok) {
      const result = await response.json();
      rawInput.value += (rawInput.value ? '\n' : '') + result.text;
      if (result.file_url) {
        voiceStatus.innerHTML = `Extracted! <a href="${result.file_url}" target="_blank" style="color:var(--blue)">View File</a>`;
      } else {
        voiceStatus.textContent = 'Extracted!';
      }
      voiceStatus.style.color = 'var(--green)';
    } else {
      throw new Error();
    }
  } catch (error) {
    voiceStatus.textContent = 'Failed';
    voiceStatus.style.color = 'var(--red)';
  }
  setTimeout(() => { if (!voiceStatus.innerHTML.includes('<a')) voiceStatus.style.display = 'none'; }, 3000);
});

loadDashboard();
setInterval(loadDashboard, 30000);
</script>
</body>
</html>
